<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Top - UnS404Portfolio</title>
    <link rel="stylesheet" href="../css/home.css">
</head>
<body>

    <!-- 実験エリア -->
    <!-- 実験エリア終わり -->
    
    <!-- home pageの第一印象エリア(外枠) -->
    <div class="hub-outer-wrapper">
        
        <!-- home pageの第一印象エリア(動画部分) -->
        <section id="hub" class="hub-section">
            
            <!-- メインビデオエリア -->
            <video id="main-video" class="hub-video-bg" muted playsinline>
                <source src="" type="video/mp4">
            </video>
            <!-- タイトルロゴ -->
            <div class="video-title-container">
                <img id="video-title-img" src="" alt="Project Logo">
            </div>
            
            <!-- プレイリスト -->
            <div id="side-index" class="video-side-index">
                </div>

            <!-- time bar -->
            <div class="video-progress-bar-bottom">
                <div id="progress-inner" class="video-progress-bar-inner"></div>
            </div>

        </section>

        <!-- キーフレーズｐ -->
        <div class="concep-text-container">
            <div class="code-editor">
                <div class="line">
                    <div id="typing-target"></div>
                    <span class="cursor"></span>
                </div>
            </div>
        </div>    

    </div>

        
    <div class="hub-site-gradient"></div>
    


    <div class="site-container">

        <!-- 名前 -->
        <section class="intro-name-section">
            <div class="intro-name-container">
                <div class="intro-text">
                    <div class="job-title-wrapper">
                        <h2 class="job-title js-decrypt">Game Programmer</h2>
                    </div>
                    
                    <div class="name-area">
                        <p class="name-en"><span class="js-decrypt">Kishida Takuma</span></p>
                        <h1 class="name-jp"><span class="js-decrypt">岸田 匠馬</span></h1>
                    </div>
                    
                    <div class="handle-name-area">
                        <p class="handle-name">
                            <span class="label-HN js-decrypt">HN</span> 
                            <span class="handle-name-main js-decrypt">UnS404</span>
                            <span class="ruby js-decrypt">(アンス)</span>
                        </p>
                    </div>
                </div>


                <div class="intro-icon">
                    <div class="icon-circle">
                        <img src="../images/icon.png" alt="プロフィールアイコン" class="icon-image">
                    </div>
                </div>
            </div>
        </section>


        <!-- 活動実績 -->
        


    </div>



    <script src="../src/home.js"></script>
</body>
</html>
