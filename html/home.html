<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Top - UnS404Portfolio</title>
    <link rel="stylesheet" href="../css/home.css">
</head>
<body>

    <!-- 実験エリア -->
    <!-- 実験エリア終わり -->
    
    <!-- home pageの第一印象エリア(外枠) -->
    <div class="hub-outer-wrapper">
        
        <!-- home pageの第一印象エリア(動画部分) -->
        <section id="hub" class="hub-section">
            
            <!-- メインビデオエリア -->
            <video id="main-video" class="hub-video-bg" muted playsinline>
                <source src="" type="video/mp4">
            </video>
            <!-- タイトルロゴ -->
            <div class="video-title-container">
                <img id="video-title-img" src="" alt="Project Logo">
            </div>
            
            <!-- プレイリスト -->
            <div id="side-index" class="video-side-index">
                </div>

            <!-- time bar -->
            <div class="video-progress-bar-bottom">
                <div id="progress-inner" class="video-progress-bar-inner"></div>
            </div>

        </section>

        <!-- キーフレーズｐ -->
        <div class="concep-text-container">
            <div class="code-editor">
                <div class="line">
                    <div id="typing-target"></div>
                    <span class="cursor"></span>
                </div>
            </div>
        </div>    

    </div>

        

    


    <div class="site-container">
        
        <section id="about-me" class="about-me-section">
            <h2 class="about-me-section__title">About Me (プレースホルダー)</h2>
            <p class="about-me-section__text">ここに自己紹介が続きます...</p>
        </section>
        
        <section id="skills" class="skills-section">
             <h2 class="skills-section__title">Skill Stack (プレースホルダー)</h2>
             </section>

        <section id="portfolio" class="portfolio-section">
             <h2 class="portfolio-section__title">Portfolio (プレースホルダー)</h2>
             </section>
    </div>



    <script src="../src/home.js"></script>
</body>
</html>
